<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hider Operations Command Dashboard</title>
  <style>
    :root {
      --bg-dark-solid: #0d1117;
      --bg-panel: #161b22;
      --bg-card: #21262d;
      --border-default: #30363d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent-blue: #58a6ff;
      --accent-green: #238636;
      --accent-gold: #d29922;
      --btn-danger: #da3637;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark-solid);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* Core Layout Framework */
    #app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: filter 0.2s ease, opacity 0.2s ease;
    }

    #app-container.dimmed {
      filter: brightness(0.15) blur(4px);
      pointer-events: none;
    }

    header {
      background-color: var(--bg-panel);
      border-bottom: 1px solid var(--border-default);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .system-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    /* Interactive Interface Elements */
    button {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }

    button:hover {
      background-color: #30363d;
      border-color: #8b949e;
    }

    button.active-toggle {
      background-color: var(--accent-blue);
      color: #0d1117;
      border-color: var(--accent-blue);
    }

    button.danger-action {
      background-color: var(--btn-danger);
      border-color: var(--btn-danger);
    }

    button.danger-action:hover {
      background-color: #b82a2b;
    }

    /* Hand & Card Display Architecture */
    .dashboard-view {
      padding: 2rem;
      flex-grow: 1;
    }

    .hand-meta-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-default);
      padding-bottom: 0.5rem;
    }

    #cards-hand-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .hand-card {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .hand-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .hand-card h4 {
      margin: 0 0 0.75rem 0;
      font-size: 1.1rem;
      color: #f0f6fc;
    }

    .hand-card .description {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 1.5rem;
      flex-grow: 1;
    }

    .card-actions-wrapper {
      display: flex;
      gap: 0.75rem;
    }

    .card-actions-wrapper button {
      flex: 1;
    }

    /* Contextual Payment UI & Selection Flags */
    .hand-card.selectable-cost-target {
      border: 2px dashed var(--accent-gold);
      cursor: pointer;
      animation: pulseBorder 1.5s infinite;
    }

    .hand-card.marked-for-payment-execution {
      border: 2px solid var(--accent-gold);
      box-shadow: 0 0 20px rgba(210, 153, 34, 0.4);
      background-color: #262216;
    }

    @keyframes pulseBorder {
      0% { border-color: var(--border-default); }
      50% { border-color: var(--accent-gold); }
      100% { border-color: var(--border-default); }
    }

    /* Dynamic Popup Modals */
    .fullscreen-modal-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--bg-panel);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8);
      z-index: 10000;
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    .fullscreen-modal-overlay h2 {
      font-size: 2rem;
      margin-top: 0;
      color: #f0f6fc;
    }

    .fullscreen-modal-overlay .sub-alert-text {
      color: var(--accent-gold);
      font-size: 1.2rem;
      font-weight: bold;
      margin: 1.5rem 0;
    }

    /* Fullscreen Action Ledger Element Viewport */
    #action-ledger-panel {
      display: none;
    }

    #action-ledger-panel.maximized {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      background-color: var(--bg-dark-solid);
      padding: 3rem;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .ledger-header-block {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-default);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .ledger-grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2.5rem;
    }

    .ledger-column {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-default);
      padding: 2rem;
      border-radius: 8px;
      min-height: 70vh;
    }

    .ledger-column h3 {
      margin-top: 0;
      border-bottom: 1px solid var(--border-default);
      padding-bottom: 0.75rem;
      font-size: 1.25rem;
    }

    .ledger-column ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    .ledger-column li {
      padding: 0.75rem;
      border-bottom: 1px solid #21262d;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <header>
      <div class="system-controls">
        <h2 style="margin: 0; margin-right: 1.5rem; font-size: 1.3rem;">Hider Command</h2>
        <button id="toggle-instapick-btn">Insta-Pick: <span id="insta-pick-status">OFF</span></button>
        <button id="toggle-endgame-btn">Endgame Mode: <span id="endgame-status">INACTIVE</span></button>
      </div>
      <div class="system-controls">
        <button id="draw-card-btn" style="background-color: var(--accent-green); border-color: var(--accent-green);">Draw Random Card</button>
        <button id="ledger-trigger">View Fullscreen History Ledger</button>
        <button id="reset-game-btn" class="danger-action">Reset Deck</button>
      </div>
    </header>

    <main class="dashboard-view">
      <div class="hand-meta-header">
        <h3>Active Hand Pool (<span id="current-hand-count">0</span> / <span id="max-hand-count">6</span>)</h3>
        <div>Deck Pile Remaining: <span id="deck-count">0</span> cards</div>
      </div>
      
      <div id="cards-hand-grid"></div>
    </main>
  </div>

  <div id="action-ledger-panel">
    <div class="ledger-header-block">
      <div>
        <h1 style="margin: 0;">Action History Ledger</h1>
        <p style="color: var(--text-secondary); margin: 0.5rem 0 0 0;">Complete comprehensive logging profile for active matches</p>
      </div>
      <button id="close-ledger-btn" style="padding: 0.75rem 1.5rem; font-size: 1rem;">Exit Ledger Interface</button>
    </div>
    
    <div class="ledger-grid-container">
      <div class="ledger-column">
        <h3 style="color: var(--accent-blue);">Cards Used</h3>
        <ul id="ledger-used-box"></ul>
      </div>
      <div class="ledger-column">
        <h3 style="color: var(--accent-gold);">Cards Skipped</h3>
        <ul id="ledger-skipped-box"></ul>
      </div>
      <div class="ledger-column">
        <h3 style="color: var(--btn-danger);">Cards Discarded</h3>
        <ul id="ledger-discarded-box"></ul>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // PARSED MASTER SYSTEM DATABASE OBJECTS (47 Cards Total)
    // ==========================================
    const CORE_CARDS_CATALOG = [
      { id: 'tb_2', name: '2 Minute Time Bonus', description: '4:2 Minute Time Bonus', isTimeBonus: true, value: 2, count: 4 },
      { id: 'tb_5', name: '5 Minute Time Bonus', description: '3: 5 Minute Time Bonus/7 Minute Time Bonus', isTimeBonus: true, value: 5, count: 3 },
      { id: 'tb_7', name: '7 Minute Time Bonus', description: '3: 5 Minute Time Bonus/7 Minute Time Bonus', isTimeBonus: true, value: 7, count: 3 },
      { id: 'tb_10', name: '10 Minute Time Bonus', description: '2: 10 Minute Time Bonus/12 Minute Time Bonus', isTimeBonus: true, value: 10, count: 2 },
      { id: 'tb_12', name: '12 Minute Time Bonus', description: '2: 10 Minute Time Bonus/12 Minute Time Bonus', isTimeBonus: true, value: 12, count: 2 },
      {

        count: 2
      },

      { 
        id: 'c_veto', 
        name: 'Veto', 
        description: 'block a Seeker\'s question, they cannot ask that Question for the rest of the game, you do not draw from this Question',
        seekerSummary: 'VETO! Your chosen question has been blocked. You cannot ask this specific question for the remainder of the game, and the Hider does not draw from it.',
        count: 2
      },
      { id: 'c_d1_dr3_p1', name: 'Discard 1 Draw 3 Pick 1', description: 'Discard 1 Draw 3 Pick 1', seekerSummary: null, count: 2 },
      { id: 'c_d1_dr2', name: 'Discard 1 Draw 2', description: 'Discard 1 Draw 2', seekerSummary: null, count: 1 },
      { id: 'c_d1_dr1_h1', name: 'Discard 1, Draw 1, increase Hand Size by 1', description: 'Discard 1, Draw 1, increase Hand Size by 1', seekerSummary: null, count: 2 },
      { id: 'c_d2_dr3_p2', name: '1: Discard 2, Draw 3, Pick 2', description: '1: Discard 2, Draw 3, Pick 2', seekerSummary: null, count: 1 },
      { 
        id: 'c_freeze', 
        name: 'Freeze', 
        description: 'inform the Seekers, they must stay in place for 5 minutes. If on transit, they may get off, but are immoble until the 5 minutes are up. If they receive the notification for the freeze before boarding a bus but board regardless, they must immediately request a stop and get off',
        seekerSummary: 'FREEZE! You must freeze in place for 5 minutes. If you are currently on transit, you may get off but cannot move further until the 5 minutes expire. If you board a bus after this notice, you must request an immediate stop and disembark.',
        count: 1
      },
      { 
        id: 'c_gifted_express', 
        name: 'Curse of the Gifted Express', 
        description: 'the Seekers must stay on their Bus until the end of the route or the last stop before it exits the Game Boundary. Casting Cost: Discard a Power up. Can only use while the Seekers are on transit',
        seekerSummary: 'CURSE OF THE GIFTED EXPRESS: You are trapped on your transit. You must remain on your current bus until it reaches the end of its route or the final stop before it exits the designated Game Boundary.',
        count: 1
      },
      { 
        id: 'c_itinerary', 
        name: 'Curse of the Itinerary', 
        description: 'the Seekers must, before boarding their next bus, inform the Hider which stop they will get off at, and must get off at that stop unless a curse forces them otherwise',
        seekerSummary: 'CURSE OF THE ITINERARY: Before boarding your next bus, you must explicitly notify the Hider which exact stop you intend to get off at. You are locked into exiting at that stop.',
        count: 1
      },
      { 
        id: 'c_marco_muzammil', 
        name: 'Curse of Marco Muzammil', 
        description: 'the Seekers must go to a playground and send a video of them going down a slide before asking another Question. Casting Cost: Discard 15+ Minutes of Time Bonuses if used in the Endgame',
        seekerSummary: 'CURSE OF MARCO MUZAMMIL: Your questions are locked. You must find a playground and send a video of yourselves going down a slide before you can ask another question.',
        count: 1
      },
      { 
        id: 'c_gamble', 
        name: 'Curse of the Gamble', 
        description: 'Predict the next Category ((Categories listed below)) the Seekers will ask a Question from ((Photo (Zone)/Oddball, Video/Measuring, Radar, Matching, Precision, Photo (You), Photo (Bus Stop))), when the Seekers ask their next question, if you are correct, you Draw the Reward 3 times, if you are wrong you draw nothing. When playing this Curse, inform the Seekers you have played it even before they have asked their next Question. Casting Cost: Reveal a Card in your hand to the Seekers.',
        seekerSummary: 'CURSE OF THE GAMBLE: The Hider has placed a bet on your next question category! If they guess right, they draw triple rewards; if they miss, they get nothing.',
        count: 1
      },
      { 
        id: 'c_dead_phone', 
        name: 'Curse of the Dead Phone', 
        description: 'The Seekers cannot use their Phones for the next 25 Minutes except to ask Questions/communicate with the Hider. Casting Cost: The Hider cannot use their phone for the next 15 minutes except to answer Questions/communicate/use Google Maps to answer a question',
        seekerSummary: 'CURSE OF THE DEAD PHONE: You cannot use your phones for the next 25 minutes for anything other than asking questions or communicating directly with the Hider.',
        count: 1
      },
      { 
        id: 'c_mobile_bus', 
        name: 'Curse of the Mobile Bus', 
        description: 'The Seekers must ask their next 3 questions while on Bus. Casting Cost: The Seeker’s next question on the Bus is free. Cannot be used in the Endgame',
        seekerSummary: 'CURSE OF THE MOBILE BUS: Your next 3 questions must be asked while you are physically on a bus.',
        count: 1
      },
      { 
        id: 'c_short_stop', 
        name: 'Curse of the Short Stop', 
        description: 'The Seekers must get off at the next stop and request a stop if not already requested. Casting Cost: The Seekers must be on transit',
        seekerSummary: 'CURSE OF THE SHORT STOP: You must immediately request a stop and get off at the very next bus stop.',
        count: 1
      },
      { 
        id: 'c_drained_brain', 
        name: 'Curse of the Drained Brain', 
        description: 'Choose any 3 Questions, they cannot be asked for the rest of the Game. Casting Cost: Discard a card. The Seeker’s next Question only Draws 1',
        seekerSummary: 'CURSE OF THE DRAINED BRAIN: 3 specific questions have been permanently blocked for the rest of the game. Additionally, your next valid question will only yield 1 draw for you.',
        count: 1
      },
      { 
        id: 'c_unguided_tourist', 
        name: 'Curse of the Unguided Tourist', 
        description: 'Take a picture of a place/building/business and send it to the Seekers, then inform them of its Google Maps rating (must have 5 reviews minimum, you cannot change the picture you are sending unless it has less than 5 reviews, you cannot check the rating of a place before taking a picture), the Seekers may not ask another Question until they have found a place with a higher rating. The Seekers take a picture, send it, and then check the rating, if it is equal or lower, they must wait 10 minutes before trying again. Casting Cost: take a picture of a place in your Zone',
        seekerSummary: 'CURSE OF THE UNGUIDED TOURIST: The Hider has sent an image of a location with its Google Maps rating. You cannot ask a question until you find a location with a higher rating. If you submit an incorrect guess, you face a 10-minute cooldown.',
        count: 1
      },
      { 
        id: 'c_nosey_looker', 
        name: 'Curse of the Nosey Looker', 
        description: 'The Seekers must find, take a picture, and send 3 of the following to the Hider before asking a Question: A dog, a sports ball, someone wearing a helmet, litter not in the proper place(and you must throw it away after taking a picture), or a fast food chain (without searching one up). Casting Cost: Do the same before sending the Question',
        seekerSummary: 'CURSE OF THE NOSEY LOOKER: Before your next question, you must find and photograph 3 items from this list: a dog, a sports ball, someone in a helmet, misplaced litter (must throw it away!), or a fast-food chain.',
        count: 1
      },
      { 
        id: 'c_nomad', 
        name: 'Curse of the Nomad', 
        description: 'send a Google Streetview image within 300m of the Seekers (the picture must be upright, not looking up into the sky or into the ground, it cannot have any blurred objects, and it must have a distinct feature(s). The Seeker must take a picture of (what they believe to be) the location, and send it to the Hider to confirm it is the right one. The Seeker cannot ask any questions until this Curse is cleared. Casting Cost: Inform the Seeker of how far this image is from the Hider’s Bus Stop',
        seekerSummary: 'CURSE OF THE NOMAD: Geoguessr mode activated. The Hider has sent a Google Streetview image taken within 300m of your position. You must locate this spot, take a matching photo, and send it back to clear your question block.',
        count: 1
      }
    ];

    // ==========================================
    // SYSTEM APPLICATION STATE STATE SCHEMA
    // ==========================================
    let gameState = {
      hand: [],
      deck: [],
      ledger: { used: [], skipped: [], discarded: [] },
      handSizeMax: 6,
      instaPick: false,
      endgameToggle: false
    };

    // ==========================================
    // LOCAL STORAGE SYNCHRONIZATION HANDLERS
    // ==========================================
    function saveStateToCache() {
      localStorage.setItem('hider_game_engine_active_state', JSON.stringify(gameState));
    }

    function readStateFromCache() {
      const payload = localStorage.getItem('hider_game_engine_active_state');
      if (payload) {
        try {
          gameState = JSON.parse(payload);
          return true;
        } catch(e) {
          console.error("Local storage corruption detected. Creating new instance.");
          return false;
        }
      }
      return false;
    }

    // ==========================================
    // DECK GENERATION ENGINE
    // ==========================================
    function buildActiveDeckInstance() {
      let freshDeck = [];
      
      CORE_CARDS_CATALOG.forEach(catalogItem => {
        for (let i = 0; i < catalogItem.count; i++) {
          freshDeck.push({
            id: catalogItem.id,
            name: catalogItem.name,
            description: catalogItem.description,
            isTimeBonus: catalogItem.isTimeBonus || false,
            value: catalogItem.value || 0,
            seekerSummary: catalogItem.seekerSummary,
            instanceId: `${catalogItem.id}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
          });
        }
      });

      // Fisher-Yates Complete Array Shuffle
      for (let i = freshDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [freshDeck[i], freshDeck[j]] = [freshDeck[j], freshDeck[i]];
      }

      gameState.deck = freshDeck;
      gameState.hand = [];
      gameState.ledger = { used: [], skipped: [], discarded: [] };
      gameState.handSizeMax = 6;
      saveStateToCache();
      renderActiveInterface();
    }

    // ==========================================
    // ACTIVE CORE CARD INTERACTION RULES
    // ==========================================
    function drawCardFromDeck() {
      if (gameState.hand.length >= gameState.handSizeMax) {
        alert("Execution Terminated: Maximum permitted hand ceiling constraint reached.");
        return;
      }
      if (gameState.deck.length === 0) {
        alert("Execution Terminated: The draw deck container is completely exhausted.");
        return;
      }

      const poppedCard = gameState.deck.pop();
      gameState.hand.push(poppedCard);
      saveStateToCache();
      renderActiveInterface();
    }

    function useCardAction(instanceId) {
      const idx = gameState.hand.findIndex(c => c.instanceId === instanceId);
      if (idx === -1) return;
      const targetCard = gameState.hand[idx];

      // Structural Constraints Check: Mobile Bus Rule
      if (targetCard.id === 'c_mobile_bus' && gameState.endgameToggle) {
        alert("Action Blocked: Curse of the Mobile Bus cannot be deployed while Endgame toggle state is active.");
        return;
      }

      // Structural Constraints Check: Marco Muzammil 15m Rule
      if (targetCard.id === 'c_marco_muzammil' && gameState.endgameToggle) {
        const structuralTimeBonuses = gameState.hand.filter(c => c.isTimeBonus);
        const aggregatedMinutesValue = structuralTimeBonuses.reduce((acc, c) => acc + c.value, 0);

        if (aggregatedMinutesValue < 15) {
          alert(`Action Intercepted: You do not meet the operational requirement. Active total time values in hand: (${aggregatedMinutesValue}m). Requires 15+ minutes of continuous time bonuses to cast in the Endgame.`);
          return;
        }

        initializeTimeDiscardSequenceOverlay(instanceId, 15);
        return;
      }

      // Contextual UI Injectors
      if (targetCard.id === 'c_randomise') {
        launchRandomiseModule(instanceId);
        return;
      }

      if (targetCard.id === 'c_duplicate') {
        launchDuplicateModule(instanceId);
        return;
      }

      if (targetCard.id === 'c_d1_dr3_p1' || targetCard.id === 'c_d2_dr3_p2') {
        launchAdvancedDiscardPickModule(instanceId, targetCard.id);
        return;
      }

      if (targetCard.id === 'c_d1_dr1_h1') {
        gameState.handSizeMax += 1;
      }

      executeResolutionSequence(idx);
    }

    function executeResolutionSequence(cardIndex) {
      const resolvingCard = gameState.hand[cardIndex];

      if (resolvingCard.seekerSummary) {
        navigator.clipboard.writeText(resolvingCard.seekerSummary)
          .then(() => console.log("Seeker operation summary automatically bound to system clipboard."))
          .catch(err => console.error("Clipboard operational warning:", err));
      }

      gameState.ledger.used.push(resolvingCard);
      gameState.hand.splice(cardIndex, 1);
      saveStateToCache();
      renderActiveInterface();
    }

    function discardCardAction(instanceId) {
      if (gameState.instaPick) {
        executeDirectDiscardMutation(instanceId);
      } else {
        if (confirm("Confirm Command Execution: Discard card from active play container?")) {
          executeDirectDiscardMutation(instanceId);
        }
      }
    }

    function executeDirectDiscardMutation(instanceId) {
      const idx = gameState.hand.findIndex(c => c.instanceId === instanceId);
      if (idx !== -1) {
        gameState.ledger.discarded.push(gameState.hand[idx]);
        gameState.hand.splice(idx, 1);
        saveStateToCache();
        renderActiveInterface();
      }
    }

    // ==========================================
    // SPECIAL CARD SELECTION SUB-OVERLAYS
    // ==========================================
    function launchRandomiseModule(instanceId) {
      const layoutContainer = document.getElementById('app-container');
      layoutContainer.classList.add('dimmed');

      const randomValue = Math.floor(Math.random() * 31) + 1;
      const modalNode = document.createElement('div');
      modalNode.className = 'fullscreen-modal-overlay';
      modalNode.innerHTML = `
        <h2>Randomise Result</h2>
        <div style="font-size: 3.5rem; color: var(--accent-blue); font-weight: 800; margin: 1rem 0;">${randomValue}</div>
        <p class="sub-alert-text">Ask Tabish what this Number means</p>
        <button id="modal-rand-confirm-btn" style="background-color: var(--accent-green); border-color: var(--accent-green);">Resolve & Close Action</button>
      `;
      document.body.appendChild(modalNode);

      document.getElementById('modal-rand-confirm-btn').onclick = () => {
        layoutContainer.classList.remove('dimmed');
        modalNode.remove();
        const targetIdx = gameState.hand.findIndex(c => c.instanceId === instanceId);
        if (targetIdx !== -1) executeResolutionSequence(targetIdx);
      };
    }

    function launchDuplicateModule(instanceId) {
      alert("Application Notice: Click any card directly inside your hand layout to complete cloning duplication mapping loop.");
      
      const DOMCards = document.querySelectorAll('.hand-card');
      DOMCards.forEach(cardNode => {
        const nodeTargetId = cardNode.getAttribute('data-id');
        if (nodeTargetId !== instanceId) {
          cardNode.classList.add('selectable-cost-target');
          cardNode.onclick = () => {
            const indexTargetCard = gameState.hand.find(c => c.instanceId === nodeTargetId);
            if (indexTargetCard) {
              gameState.hand.push({
                ...indexTargetCard,
                instanceId: `${indexTargetCard.id}_dupe_${Date.now()}_${Math.random().toString(36).substr(2, 4)}`
              });
              
              const currentSelfIdx = gameState.hand.findIndex(c => c.instanceId === instanceId);
              if (currentSelfIdx !== -1) executeResolutionSequence(currentSelfIdx);
            }
          };
        }
      });
    }

    function launchAdvancedDiscardPickModule(parentInstanceId, cardTypeString) {
      const nestedContainer = document.getElementById('app-container');
      nestedContainer.classList.add('dimmed');

      const selectModal = document.createElement('div');
      selectModal.className = 'fullscreen-modal-overlay';
      selectModal.style.maxWidth = '650px';
      
      const requiredDiscardCount = (cardTypeString === 'c_d2_dr3_p2') ? 2 : 1;
      const finalPickCount = (cardTypeString === 'c_d2_dr3_p2') ? 2 : 1;

      selectModal.innerHTML = `
        <h3>Operational Interface Split: ${gameState.hand.find(c => c.instanceId === parentInstanceId).name}</h3>
        <p id="adv-modal-instructions">Step 1: Choose ${requiredDiscardCount} card(s) from your hand to discard.</p>
        <div id="adv-modal-hand-selections" style="display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center; margin:1rem 0;"></div>
        <div id="adv-modal-deck-draws" style="display:none; gap:1rem; justify-content:center; margin:1.5rem 0;"></div>
        <button id="adv-modal-action-step-btn" disabled>Confirm Discard Selection</button>
      `;
      document.body.appendChild(selectModal);

      const modalHandWrapper = document.getElementById('adv-modal-hand-selections');
      let targetedDiscardIds = [];

      gameState.hand.forEach(hCard => {
        if (hCard.instanceId !== parentInstanceId) {
          const itemButton = document.createElement('button');
          itemButton.innerText = hCard.name;
          itemButton.style.fontSize = '0.8rem';
          itemButton.onclick = () => {
            if (targetedDiscardIds.includes(hCard.instanceId)) {
              targetedDiscardIds = targetedDiscardIds.filter(id => id !== hCard.instanceId);
              itemButton.style.borderColor = 'var(--border-default)';
              itemButton.style.backgroundColor = 'var(--bg-card)';
            } else if (targetedDiscardIds.length < requiredDiscardCount) {
              targetedDiscardIds.push(hCard.instanceId);
              itemButton.style.borderColor = 'var(--accent-gold)';
              itemButton.style.backgroundColor = '#382e16';
            }
            document.getElementById('adv-modal-action-step-btn').disabled = (targetedDiscardIds.length !== requiredDiscardCount);
          };
          modalHandWrapper.appendChild(itemButton);
        }
      });

      let stepTracker = 1;
      let drawnOptions = [];
      let targetedPickIds = [];

      document.getElementById('adv-modal-action-step-btn').onclick = () => {
        if (stepTracker === 1) {
          // Commit Discard Mutations
          targetedDiscardIds.forEach(id => {
            const discIdx = gameState.hand.findIndex(c => c.instanceId === id);
            if (discIdx !== -1) {
              gameState.ledger.discarded.push(gameState.hand[discIdx]);
              gameState.hand.splice(discIdx, 1);
            }
          });

          // Draw 3 internal reference options
          for (let i = 0; i < 3; i++) {
            if (gameState.deck.length > 0) {
              drawnOptions.push(gameState.deck.pop());
            }
          }

          stepTracker = 2;
          modalHandWrapper.style.display = 'none';
          const deckWrapper = document.getElementById('adv-modal-deck-draws');
          deckWrapper.style.display = 'flex';
          
          document.getElementById('adv-modal-instructions').innerText = `Step 2: Flip and select exactly ${finalPickCount} card(s) to add into your Hand Pool.`;
          const stepBtn = document.getElementById('adv-modal-action-step-btn');
          stepBtn.innerText = "Commit Picks & Finalize Action";
          stepBtn.disabled = true;

          drawnOptions.forEach((dCard, dIdx) => {
            const faceDownNode = document.createElement('div');
            faceDownNode.style.width = '120px';
            faceDownNode.style.height = '160px';
            faceDownNode.style.backgroundColor = 'var(--bg-card)';
            faceDownNode.style.border = '2px dashed var(--text-secondary)';
            faceDownNode.style.borderRadius = '6px';
            faceDownNode.style.display = 'flex';
            faceDownNode.style.alignItems = 'center';
            faceDownNode.style.justifyContent = 'center';
            faceDownNode.style.cursor = 'pointer';
            faceDownNode.style.fontSize = '0.85rem';
            faceDownNode.style.padding = '0.5rem';
            faceDownNode.innerText = "[ Hidden Deck Card ]";

            faceDownNode.onclick = () => {
              if (faceDownNode.getAttribute('data-flipped') !== 'true') {
                faceDownNode.setAttribute('data-flipped', 'true');
                faceDownNode.style.border = '1px solid var(--border-default)';
                faceDownNode.style.backgroundColor = 'var(--bg-panel)';
                faceDownNode.innerText = dCard.name;
              } else {
                if (targetedPickIds.includes(dCard.instanceId)) {
                  targetedPickIds = targetedPickIds.filter(id => id !== dCard.instanceId);
                  faceDownNode.style.borderColor = 'var(--border-default)';
                  faceDownNode.style.boxShadow = 'none';
                } else if (targetedPickIds.length < finalPickCount) {
                  targetedPickIds.push(dCard.instanceId);
                  faceDownNode.style.borderColor = 'var(--accent-green)';
                  faceDownNode.style.boxShadow = '0 0 10px rgba(35,134,54,0.5)';
                }
                stepBtn.disabled = (targetedPickIds.length !== finalPickCount);
              }
            };
            deckWrapper.appendChild(faceDownNode);
          });
        } else {
          // Resolve Final Picks to hand
          drawnOptions.forEach(opt => {
            if (targetedPickIds.includes(opt.instanceId)) {
              if (gameState.hand.length < gameState.handSizeMax) {
                gameState.hand.push(opt);
              } else {
                gameState.ledger.discarded.push(opt); // Automated fallback protection if hand overflows
              }
            } else {
              gameState.ledger.skipped.push(opt);
            }
          });

          nestedContainer.classList.remove('dimmed');
          selectModal.remove();

          const baseParentIdx = gameState.hand.findIndex(c => c.instanceId === parentInstanceId);
          if (baseParentIdx !== -1) executeResolutionSequence(baseParentIdx);
        }
      };
    }

    function initializeTimeDiscardSequenceOverlay(curseInstanceId, requiredValue) {
      let runtimeAccumulatorValue = 0;
      let transactionTargetIds = [];

      alert(`Casting Engine Notice: Select combinations of your available Time Bonus elements totaling to equal or greater than ${requiredValue} minutes to fulfill casting cost requirement values.`);

      const dynamicCards = document.querySelectorAll('.hand-card');
      dynamicCards.forEach(cardEl => {
        const DOMRefId = cardEl.getAttribute('data-id');
        const activeHandItem = gameState.hand.find(c => c.instanceId === DOMRefId);

        if (activeHandItem && activeHandItem.isTimeBonus) {
          cardEl.classList.add('selectable-cost-target');
          cardEl.onclick = () => {
            if (!transactionTargetIds.includes(DOMRefId)) {
              transactionTargetIds.push(DOMRefId);
              runtimeAccumulatorValue += activeHandItem.value;
              cardEl.classList.remove('selectable-cost-target');
              cardEl.classList.add('marked-for-payment-execution');

              if (runtimeAccumulatorValue >= requiredValue) {
                transactionTargetIds.forEach(id => {
                  const subDiscardTargetIdx = gameState.hand.findIndex(c => c.instanceId === id);
                  if (subDiscardTargetIdx !== -1) {
                    gameState.ledger.discarded.push(gameState.hand[subDiscardTargetIdx]);
                    gameState.hand.splice(subDiscardTargetIdx, 1);
                  }
                });

                const structuralCurseIndex = gameState.hand.findIndex(c => c.instanceId === curseInstanceId);
                if (structuralCurseIndex !== -1) executeResolutionSequence(structuralCurseIndex);
              }
            }
          };
        }
      });
    }

    function toggleLedgerPanelLayout() {
      document.getElementById('action-ledger-panel').classList.toggle('maximized');
    }

    // ==========================================
    // UI CORE RENDERING SYNCHRONIZATION 
    // ==========================================
    function renderActiveInterface() {
      document.getElementById('insta-pick-status').innerText = gameState.instaPick ? "ON" : "OFF";
      document.getElementById('insta-pick-status').parentElement.className = gameState.instaPick ? "active-toggle" : "";
      
      document.getElementById('endgame-status').innerText = gameState.endgameToggle ? "ACTIVE" : "INACTIVE";
      document.getElementById('endgame-status').parentElement.className = gameState.endgameToggle ? "active-toggle" : "";

      document.getElementById('current-hand-count').innerText = gameState.hand.length;
      document.getElementById('max-hand-count').innerText = gameState.handSizeMax;
      document.getElementById('deck-count').innerText = gameState.deck.length;

      const handGridNode = document.getElementById('cards-hand-grid');
      handGridNode.innerHTML = '';

      gameState.hand.forEach(cardInstance => {
        const nodeCardElement = document.createElement('div');
        nodeCardElement.className = 'hand-card';
        nodeCardElement.setAttribute('data-id', cardInstance.instanceId);
        
        nodeCardElement.innerHTML = `
          <div>
            <h4>${cardInstance.name}</h4>
            <div class="description">${cardInstance.description}</div>
          </div>
          <div class="card-actions-wrapper">
            <button onclick="useCardAction('${cardInstance.instanceId}')" style="background-color: #21262d; border-color: var(--accent-blue);">Use</button>
            <button onclick="discardCardAction('${cardInstance.instanceId}')" class="danger-action">Discard</button>
          </div>
        `;
        handGridNode.appendChild(nodeCardElement);
      });

      document.getElementById('ledger-used-box').innerHTML = gameState.ledger.used.map(c => `<li><b>${c.name}</b><br><small style="color:var(--text-secondary);">${c.description}</small></li>`).join('');
      document.getElementById('ledger-skipped-box').innerHTML = gameState.ledger.skipped.map(c => `<li><b>${c.name}</b><br><small style="color:var(--text-secondary);">${c.description}</small></li>`).join('');
      document.getElementById('ledger-discarded-box').innerHTML = gameState.ledger.discarded.map(c => `<li><b>${c.name}</b><br><small style="color:var(--text-secondary);">${c.description}</small></li>`).join('');
    }

    // ==========================================
    // MAIN LIFECYCLE DOM MOUNT HOOKS
    // ==========================================
    window.onload = () => {
      if (!readStateFromCache()) {
        buildActiveDeckInstance();
      } else {
        renderActiveInterface();
      }

      document.getElementById('toggle-instapick-btn').onclick = () => {
        gameState.instaPick = !gameState.instaPick;
        saveStateToCache();
        renderActiveInterface();
      };

      document.getElementById('toggle-endgame-btn').onclick = () => {
        gameState.endgameToggle = !gameState.endgameToggle;
        saveStateToCache();
        renderActiveInterface();
      };

      document.getElementById('draw-card-btn').onclick = drawCardFromDeck;
      document.getElementById('ledger-trigger').onclick = toggleLedgerPanelLayout;
      document.getElementById('close-ledger-btn').onclick = toggleLedgerPanelLayout;
      
      document.getElementById('reset-game-btn').onclick = () => {
        if (confirm("Reset application environment state database completely?")) {
          buildActiveDeckInstance();
        }
      };
    };
  </script>
</body>
</html>
